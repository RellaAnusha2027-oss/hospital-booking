<!DOCTYPE html>
<html>
<head>
    <title>Hospital Booking System</title>
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color:white;
            text-align:center;
        }

        .container{
            margin-top:150px;
        }

        h1{
            font-size:40px;
        }

        .btn{
            display:inline-block;
            margin:15px;
            padding:12px 25px;
            background:white;
            color:#203a43;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            background:#f2f2f2;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏥 Hospital Booking System</h1>
    <p>Welcome to Online Appointment Portal</p>

    <a href="/doctors" class="btn">View Doctors</a>
    <a href="/appointment" class="btn">Book Appointment</a>
    <a href="/delete" class="btn">Cancel Appointment</a>
</div>

</body>
</html>
