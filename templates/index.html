<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityCare Hospital</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0077b6, #00b4d8);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:50px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:500px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.logo{
    width:80px;
    margin-bottom:15px;
}

h1{
    color:#0077b6;
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:30px;
}

.btn{
    display:block;
    margin:15px auto;
    padding:12px 25px;
    width:80%;
    background: linear-gradient(to right, #00b4d8, #0077b6);
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background: linear-gradient(to right, #0077b6, #023e8a);
}

.footer{
    margin-top:20px;
    font-size:14px;
    color:#777;
}

@media(max-width:600px){
    .container{
        padding:30px;
    }
}
</style>
</head>

<body>

<div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/2966/2966489.png" class="logo">
    <h1>CityCare Hospital</h1>
    <p>Your Health, Our Priority</p>

    <a href="/doctors" class="btn">View Doctors</a>
    <a href="/appointment" class="btn">Book Appointment</a>
    <a href="/delete" class="btn">Cancel Appointment</a>

    <div class="footer">
        © 2026 CityCare Hospital | All Rights Reserved
    </div>
</div>

</body>
</html>
